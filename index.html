<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Circle Fit</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game">
      <canvas id="circleCanvas" aria-label="Circle drawing game"></canvas>

      <section class="hud" aria-live="polite">
        <div class="hud-block">
          <span class="hud-label">Score</span>
          <strong id="scoreValue">--</strong>
        </div>
        <div class="hud-block hud-block-wide">
          <span class="hud-label">Fit</span>
          <strong id="fitValue">Ready</strong>
        </div>
        <button id="resetButton" type="button" title="Reset attempt">Reset</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
